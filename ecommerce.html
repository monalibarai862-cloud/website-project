<!DOCTYPE html>
<html>

<head>

<title>E-Commerce Website</title>

<meta name="viewport" content="width=device-width, initial-scale=1">


<style>

body{

font-family:Arial;
background:#f5f5f5;
margin:0;

}



header{

background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
padding:35px;

}



.search{

text-align:center;
margin:25px;

}



input{

padding:12px;
width:70%;
border-radius:20px;
border:1px solid gray;

}



button{

background:#667eea;
color:white;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;

}



button:hover{

transform:scale(1.05);

}




.categories{

text-align:center;
margin:20px;

}





.container{

display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;

}





.card{

background:white;
width:280px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px #ccc;
transition:.4s;

}



.card:hover{

transform:translateY(-10px);

}



.card img{

width:100%;
height:180px;
object-fit:cover;
border-radius:15px;

}





#cart{

background:#111827;
color:white;
padding:15px;
position:fixed;
right:20px;
top:20px;
border-radius:20px;

}





#popup{

display:none;
position:fixed;
top:15%;
left:20%;
width:60%;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 30px gray;

}




.form{

background:white;
padding:30px;
margin:40px;
border-radius:20px;
text-align:center;

}


textarea{

width:70%;
height:100px;

}



</style>


</head>


<body>



<header>


<h1>
🛒 Monali E-Commerce Website
</h1>


<p>
Shop smart and easy
</p>


</header>







<div id="cart">

Cart: <span id="count">0</span>

</div>







<div class="search">


<input id="search"
placeholder="Search products..."
onkeyup="searchProduct()">


</div>






<div class="categories">


<button onclick="filter('All')">
All
</button>


<button onclick="filter('Fashion')">
Fashion
</button>


<button onclick="filter('Electronics')">
Electronics
</button>


<button onclick="filter('Beauty')">
Beauty
</button>


</div>







<div class="container" id="products">


</div>









<div id="popup">


<h2 id="pname"></h2>


<p id="pdetails"></p>


<button onclick="closeBox()">

Close

</button>


</div>










<div class="form">


<h2>
Order Form
</h2>


<input id="name"
placeholder="Your Name">


<br><br>


<input id="email"
placeholder="Email">


<br><br>


<textarea id="address"
placeholder="Delivery Address"></textarea>


<br><br>


<button onclick="order()">

Place Order

</button>


<p id="msg"></p>



</div>









<script>



let cart=0;



let products=[


{

name:"T-Shirt",

category:"Fashion",

price:"₹499",

image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab",

details:"Comfortable cotton T-Shirt"

},



{

name:"Laptop",

category:"Electronics",

price:"₹50000",

image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853",

details:"High performance laptop"

},




{

name:"Headphones",

category:"Electronics",

price:"₹1999",

image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e",

details:"Wireless headphones"

},




{

name:"Lipstick",

category:"Beauty",

price:"₹399",

image:"https://images.unsplash.com/photo-1586495777744-4413f21062fa",

details:"Beauty product"

}





];







function display(data){



let box=document.getElementById("products");


box.innerHTML="";



data.forEach(p=>{


box.innerHTML+=`


<div class="card">


<img src="${p.image}">


<h2>
${p.name}
</h2>


<p>
${p.price}
</p>


<button onclick="details('${p.name}')">

View

</button>



<button onclick="addCart()">

Add Cart

</button>


</div>


`;

});


}



display(products);








function searchProduct(){


let value=

document.getElementById("search")
.value
.toLowerCase();



display(

products.filter(p=>

p.name.toLowerCase()
.includes(value)

)

);


}









function filter(cat){


if(cat=="All")

display(products);


else

display(

products.filter(p=>

p.category==cat

)

);


}







function addCart(){


cart++;


document.getElementById("count")
.innerHTML=cart;


}





function details(name){


let p=
products.find(x=>x.name==name);


document.getElementById("pname")
.innerHTML=p.name;



document.getElementById("pdetails")
.innerHTML=

p.details+"<br>"+p.price;



document.getElementById("popup")
.style.display="block";


}





function closeBox(){

document.getElementById("popup")
.style.display="none";

}








function order(){


let n=
document.getElementById("name").value;


let e=
document.getElementById("email").value;


let a=
document.getElementById("address").value;



if(n==""||e==""||a==""){


msg.innerHTML="Fill all details";


msg.style.color="red";


return;


}



msg.innerHTML=
"Order placed successfully!";


msg.style.color="green";


}




</script>


</body>

</html>
